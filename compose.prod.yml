services:
  app:
    image: ghcr.io/loramint/loramint_docker:latest
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgres://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      - TTN_APP_KEY=${TTN_APP_KEY}
      - NODE_ENV=production
      - LEGAL_IMPRESSUM=${LEGAL_IMPRESSUM}
      - LEGAL_DATENSCHUTZ=${LEGAL_DATENSCHUTZ}
    depends_on:
      - db
    networks:
      - internal
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.loramint.rule=Host(`${APP_DOMAIN}`)"
      - "traefik.http.routers.loramint.entrypoints=websecure"
      - "traefik.http.routers.loramint.tls=true"
      - "traefik.http.routers.loramint.tls.certResolver=http_resolver"
      - "traefik.http.services.loramint.loadbalancer.server.port=8090"
      - "traefik.docker.network=traefik"

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - internal

networks:
  internal:
  traefik:
    external: true

volumes:
  db_data:
